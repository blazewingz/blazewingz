<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BlazeWingz Launcher</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
}

/* LAYOUT */
.container {
  display: flex;
  gap: 30px;
  padding: 20px;
}

/* GAME */
iframe {
  width: 70%;
  height: 500px;
  border: none;
  background: black;
  box-shadow: 0 0 20px rgba(255,0,0,0.2);
}

/* PANEL */
.panel {
  width: 30%;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* SELECTOR */
.selector {
  background: #2b2b2b;
  padding: 12px;
  cursor: pointer;
  border: 1px solid #444;
  display: flex;
  justify-content: space-between;
}

.dropdown {
  display: none;
  flex-direction: column;
  background: #1f1f1f;
  border: 1px solid #444;
}

.dropdown.show {
  display: flex;
}

.option {
  padding: 12px;
  cursor: pointer;
}

.option:hover {
  background: #333;
}

.option.active {
  color: red;
}

/* BUTTONS */
.play {
  background: #1a0000;
  border: 1px solid red;
  padding: 14px;
  font-size: 16px;
  cursor: pointer;
}

.play:hover {
  background: #300000;
}

.fullscreen {
  text-align: center;
  border: 1px solid #555;
  padding: 12px;
  color: #aaa;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- GAME -->
  <iframe id="gameFrame" src="https://example.com"></iframe>

  <!-- PANEL -->
  <div class="panel">

    <div class="selector" onclick="toggleDropdown()">
      <span id="selectedLabel">Latest release - 1.8</span>
      <span>⌄</span>
    </div>

    <div id="dropdown" class="dropdown">
      <div class="option active" onclick="selectVersion(this,'Latest release - 1.8','https://example.com/mc-1.8')">
        Latest release - 1.8
      </div>
      <div class="option" onclick="selectVersion(this,'Latest release - 1.12','https://example.com/mc-1.12')">
        Latest release - 1.12
      </div>
      <div class="option" onclick="selectVersion(this,'Snapshot 24w14a','https://example.com/mc-snap')">
        Snapshot 24w14a
      </div>
    </div>

    <button class="play" onclick="launchGame()">▶ PLAY</button>

    <a class="fullscreen" href="#" target="_blank">FULLSCREEN</a>

  </div>

</div>

<script>
let selectedGameUrl = "https://example.com/mc-1.8";
let currentLabel = "Latest release - 1.8";

function toggleDropdown() {
  document.getElementById("dropdown").classList.toggle("show");
}

function selectVersion(el, label, url) {
  selectedGameUrl = url;
  currentLabel = label;

  document.getElementById("selectedLabel").innerText = label;

  document.querySelectorAll(".option").forEach(o => o.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("gameFrame").src = url;

  document.getElementById("dropdown").classList.remove("show");
}

function launchGame() {
  const win = window.open("about:blank", "_blank");

  win.document.open();
  win.document.write(`
    <html>
    <head>
      <title>BlazeWingz - ${currentLabel}</title>
      <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
      <style>
        body { margin:0; background:black; }
        iframe { width:100vw; height:100vh; border:none; }
      </style>
    </head>
    <body>
      <iframe src="${selectedGameUrl}" allowfullscreen></iframe>
    </body>
    </html>
  `);
  win.document.close();
}
</script>

</body>
</html>
